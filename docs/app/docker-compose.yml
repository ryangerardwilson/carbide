services:
  web:
    build:
      context: ..
      dockerfile: app/web/Dockerfile
    environment:
      APP_ENV: "${APP_ENV:-development}"
      PUBLIC_APP_NAME: "${PUBLIC_APP_NAME:-Carbide Docs}"
      PUBLIC_URL: "${PUBLIC_URL:-http://localhost:${CARBIDE_HTTP_PORT:-8080}}"
      API_URL: http://api:8080
    ports:
      - "${CARBIDE_HTTP_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:8080/health').then(r => { if (!r.ok) process.exit(1) })"]
      interval: 10s
      timeout: 5s
      retries: 12
    develop:
      watch:
        - action: rebuild
          path: ./web/src
        - action: rebuild
          path: ./web/index.html
        - action: rebuild
          path: ./web/package.json
        - action: rebuild
          path: ./web/bun.lock
        - action: rebuild
          path: ./web/tsconfig.json
        - action: rebuild
          path: ./web/Dockerfile
        - action: rebuild
          path: ../site
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgres://carbide:${POSTGRES_PASSWORD:-carbide}@db:5432/carbide?sslmode=disable}"
      PUBLIC_URL: "${PUBLIC_URL:-http://localhost:${CARBIDE_HTTP_PORT:-8080}}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/api", "-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 12
    develop:
      watch:
        - action: rebuild
          path: ./api
    restart: unless-stopped

  db:
    image: postgres:17-alpine@sha256:dc17045ccfd343b49600570ea734b9c4991cf1c3f3302e67df51e3b402dd55c4
    environment:
      POSTGRES_DB: carbide
      POSTGRES_USER: carbide
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-carbide}"
    volumes:
      - carbide_docs_pgdata:/var/lib/postgresql/data
      - ./db/migration:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carbide -d carbide"]
      interval: 5s
      timeout: 5s
      retries: 12
    develop:
      watch:
        - action: rebuild
          path: ./db/migration
    restart: unless-stopped

volumes:
  carbide_docs_pgdata:
