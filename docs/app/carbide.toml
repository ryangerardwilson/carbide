name = "Carbide Docs"
slug = "carbide-docs"
profile = "docs"

[dev]
default_port = 8080
database = "postgres"

[runtime]
contract_version = 1
policy = "explicit-baseline"
go_module = "1.25.0"
go_builder_image = "golang:1.26-bookworm@sha256:b305420a68d0f229d91eb3b3ed9e519fcf2cf5461da4bef997bf927e8c0bfd2b"
api_runtime_image = "debian:trixie-slim@sha256:28de0877c2189802884ccd20f15ee41c203573bd87bb6b883f5f46362d24c5c2"
bun_image = "oven/bun:1.3.14-debian@sha256:9dba1a1b43ce28c9d7931bfc4eb00feb63b0114720a0277a8f939ae4dfc9db6f"
postgres_image = "postgres:17-alpine@sha256:dc17045ccfd343b49600570ea734b9c4991cf1c3f3302e67df51e3b402dd55c4"
react = "19.2.7"
react_dom = "19.2.7"
tailwindcss = "4.3.2"
tailwind_cli = "4.3.2"

[env]
contract_version = 1

[env.variables.APP_ENV]
service = "web"
required = false
secret = false
browser_exposed = false
framework_owned = true
local_default = "development"
description = "Application runtime environment."

[env.variables.PUBLIC_APP_NAME]
service = "web"
required = false
secret = false
browser_exposed = true
framework_owned = false
local_default = "Carbide Docs"
description = "Public application name rendered by the docs app."

[env.variables.PUBLIC_URL]
service = "web"
required = false
secret = false
browser_exposed = true
framework_owned = false
local_default = "http://localhost:8080"
description = "Public URL used in diagnostics and logs."

[env.variables.DATABASE_URL]
service = "api"
required = true
secret = true
browser_exposed = false
framework_owned = true
local_default = "postgres://carbide:carbide@db:5432/carbide?sslmode=disable"
description = "Postgres connection string for the API service."

[env.variables.POSTGRES_PASSWORD]
service = "db"
required = true
secret = true
browser_exposed = false
framework_owned = true
local_default = "carbide"
description = "Postgres password used by the db container."

[deploy]
preview_before_apply = true

[deploy.hosts.prod]
ssh = "${CARBIDE_DOCS_DEPLOY_SSH}"
description = "Host used for the public Carbide documentation app."

[deploy.targets.prod]
type = "ssh-compose"
host = "prod"
domain = "carbide.ryangerardwilson.com"
remote_path = "/opt/carbide/docs"
source_path = ".."
compose_file = "app/docker-compose.yml"
project_directory = "app"
public_port = 18081
health_path = "/health"
nginx = true
nginx_site = "carbide"

[deploy.targets.prod-environment]
type = "ssh-compose-environment"
domain = "carbide.ryangerardwilson.com"
remote_path = "/opt/carbide/docs"
source_path = ".."
compose_file = "app/docker-compose.yml"
project_directory = "app"
health_path = "/health"
strategy = "preview-only"

[deploy.targets.prod-environment.roles.web]
hosts = ["prod"]
public_port = 18081
nginx = true

[deploy.targets.prod-environment.roles.api]
hosts = ["prod"]

[deploy.targets.prod-environment.roles.db]
hosts = ["prod"]
primary = "prod"
migration = "once"
