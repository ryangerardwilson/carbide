<!doctype html>
<html lang="en" class="[scrollbar-width:thin] [scrollbar-color:rgb(163_163_163)_transparent] hover:[scrollbar-color:rgb(115_115_115)_transparent] dark:[scrollbar-color:rgb(82_82_82)_transparent] dark:hover:[scrollbar-color:rgb(115_115_115)_transparent]">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Carbide Docs | Carbide</title>
    <script>
      (() => {
        try {
          const key = 'carbide.theme';
          const stored = window.localStorage.getItem(key);
          const mode = ['light', 'dark', 'system'].includes(stored) ? stored : 'system';
          const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          const resolved = mode === 'dark' || (mode === 'system' && prefersDark) ? 'dark' : 'light';
          document.documentElement.dataset.theme = resolved;
          document.documentElement.dataset.themeMode = mode;
          document.documentElement.style.colorScheme = resolved;
        } catch {
          document.documentElement.dataset.theme = 'light';
          document.documentElement.dataset.themeMode = 'system';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
