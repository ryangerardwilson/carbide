name: __PROJECT_SLUG__

services:
  web:
    build:
      context: ./web
    environment:
      API_URL: http://api:8080
      PUBLIC_URL: "http://localhost:${CARBIDE_HTTP_PORT:-8080}"
      PUBLIC_APP_NAME: "${PUBLIC_APP_NAME:-__PROJECT_NAME__}"
    ports:
      - "${CARBIDE_HTTP_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./web/src
        - action: rebuild
          path: ./web/index.html
        - action: rebuild
          path: ./web/package.json
        - action: rebuild
          path: ./web/bun.lock
        - action: rebuild
          path: ./web/Dockerfile

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      APP_ENV: "${APP_ENV:-development}"
      APP_PORT: "8080"
      PUBLIC_URL: "http://localhost:${CARBIDE_HTTP_PORT:-8080}"
      DATABASE_URL: "postgres://carbide:${POSTGRES_PASSWORD:-carbide}@db:5432/carbide"
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./api
        - action: rebuild
          path: ./db
        - action: rebuild
          path: ./api/Dockerfile

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: carbide
      POSTGRES_USER: carbide
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-carbide}"
    volumes:
      - carbide_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carbide -d carbide"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  carbide_pgdata:
