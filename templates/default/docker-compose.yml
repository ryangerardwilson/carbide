name: __PROJECT_SLUG__

services:
  frontend:
    build:
      context: ./view/web
    environment:
      BACKEND_URL: http://backend:8080
      PUBLIC_URL: "http://localhost:${SEALION_HTTP_PORT:-8080}"
    ports:
      - "${SEALION_HTTP_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./view/web/src
        - action: rebuild
          path: ./view/web/index.html
        - action: rebuild
          path: ./view/web/package.json
        - action: rebuild
          path: ./view/web/bun.lock
        - action: rebuild
          path: ./view/web/Dockerfile

  backend:
    build:
      context: .
    environment:
      APP_PORT: "8080"
      PUBLIC_URL: "http://localhost:${SEALION_HTTP_PORT:-8080}"
      DATABASE_URL: postgres://sealion:sealion@db:5432/sealion
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./go.mod
        - action: rebuild
          path: ./go.sum
        - action: rebuild
          path: ./src
        - action: rebuild
          path: ./model
        - action: rebuild
          path: ./controller
        - action: rebuild
          path: ./Dockerfile

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sealion
      POSTGRES_USER: sealion
      POSTGRES_PASSWORD: sealion
    volumes:
      - sealion_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sealion -d sealion"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  sealion_pgdata:
