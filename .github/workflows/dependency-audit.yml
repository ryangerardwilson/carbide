name: Dependency audit

on:
  schedule:
    - cron: "17 6 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Report runtime drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Report dependency and image drift
        run: bash tests/contract/audit_versions.sh
