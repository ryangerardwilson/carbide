name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cli:
    name: CLI release binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist
          commit="$(git rev-parse --short HEAD)"
          go build \
            -ldflags "-X github.com/ryangerardwilson/carbide/cli/internal/cli.commit=$commit" \
            -o dist/carbide \
            ./cmd/carbide
          archive="carbide_${GOOS}_${GOARCH}.tar.gz"
          tar -C dist -czf "../$archive" carbide
          sha256sum "../$archive" > "../$archive.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: carbide-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            carbide_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
            carbide_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz.sha256

  publish:
    name: Publish GitHub release
    needs: cli
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
