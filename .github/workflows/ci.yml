name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-contract:
    name: Repo contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Check shell syntax
        run: bash -n tests/contract/audit_versions.sh tests/contract/check_repo_contract.sh tests/scaffold/cli_scaffold.sh tests/smoke/starter_docker_flow.sh tests/smoke/docs_for_agents_http.sh cli/bin/carbide cli/install.sh

      - name: Test Go CLI
        working-directory: cli
        run: go test ./...

      - name: Check repository contract
        run: bash tests/contract/check_repo_contract.sh

      - name: Test CLI scaffold
        run: bash tests/scaffold/cli_scaffold.sh

      - name: Test generated Docker flow
        run: bash tests/smoke/starter_docker_flow.sh

      - name: Test live agent guide
        run: bash tests/smoke/docs_for_agents_http.sh
