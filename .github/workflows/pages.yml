name: Publish docs

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - cli/**
      - docs/**
      - tests/**
      - .github/workflows/pages.yml
      - .github/workflows/ci.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate docs contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Check shell syntax
        run: bash -n tests/contract/audit_versions.sh tests/contract/check_repo_contract.sh tests/scaffold/cli_scaffold.sh tests/smoke/starter_docker_flow.sh cli/bin/carbide cli/install.sh

      - name: Test Go CLI
        working-directory: cli
        run: go test ./...

      - name: Check repository contract
        run: bash tests/contract/check_repo_contract.sh

      - name: Test CLI scaffold
        run: bash tests/scaffold/cli_scaffold.sh

  deploy:
    name: Deploy GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
